name: Build APK (sem keystore)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK (release, assinatura debug)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 🚫 REMOVA ESTE BLOCO (Python e Chaquopy)
      # - name: Configurar Python (para Chaquopy)
      #   uses: actions/setup-python@v5
      #   with:
      #     python-version: '3.11'
      # - name: Instalar dependências Python
      #   run: |
      #     python -m pip install --upgrade pip
      #     pip install ytmusicapi yt-dlp

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Instalar dependências
        run: flutter pub get

      - name: Limpar artefatos de build
        run: flutter clean

      - name: Build APK (release, otimizado para 64 bits)
        run: |
          flutter build apk --release \
            --target-platform android-arm64 \
            --no-tree-shake-icons \
            --android-skip-build-dependency-validation \
            --dart-define=JAMENDO_CLIENT_ID=${{ secrets.JAMENDO_CLIENT_ID }} \
            --dart-define=LASTFM_API_KEY=${{ secrets.LASTFM_API_KEY }} \
            --dart-define=LISTENNOTES_API_KEY=${{ secrets.LISTENNOTES_API_KEY }}

      - name: Upload do APK como artefato
        uses: actions/upload-artifact@v4
        with:
          name: spot-music-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
