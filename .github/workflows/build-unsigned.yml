name: Build APK (sem keystore)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK (release, assinatura debug)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          # Usando uma versão mais recente que atende ao requisito de SDK do wakelock_plus e win32
          flutter-version: '3.24.5' 
          channel: 'stable'
          cache: true

      - name: Instalar dependências
        # O --precompile ajuda a resolver conflitos de resolução
        run: flutter pub get

      - name: Limpar artefatos de build
        run: flutter clean

      - name: Build APK (release, otimizado para 64 bits)
        run: |
          flutter build apk --release \
            --target-platform android-arm64 \
            --no-tree-shake-icons \
            --android-skip-build-dependency-validation \
            --dart-define=JAMENDO_CLIENT_ID=${{ secrets.JAMENDO_CLIENT_ID }} \
            --dart-define=LASTFM_API_KEY=${{ secrets.LASTFM_API_KEY }}

      - name: Upload do APK como artefato
        uses: actions/upload-artifact@v4
        with:
          name: spot-music-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
